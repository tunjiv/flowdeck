kind = "web"
previewPath = "/"
title = "FlowDeck"
version = "1.0.0"
id = "artifacts/flowdeck"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21518

[services.development]
run = "pnpm --filter @workspace/flowdeck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flowdeck", "run", "build" ]
publicDir = "artifacts/flowdeck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21518"
BASE_PATH = "/"
