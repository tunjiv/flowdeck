kind = "mobile"
previewPath = "/mobile/"
title = "FlowDeck Mobile"
version = "1.0.0"
id = "artifacts/flowdeck-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20421

[services.development]
run = "pnpm --filter @workspace/flowdeck-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flowdeck-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/flowdeck-mobile", "run", "serve" ]

[services.env]
PORT = "20421"
BASE_PATH = "/mobile/"
